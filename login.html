<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银川市卫健委体重管理系统 - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#FFFFFF;min-height:100vh;display:flex}
        .brand-section{flex:1;background:linear-gradient(135deg,#00BAAD 0%,#00D4C8 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:60px;position:relative;overflow:hidden}
        .brand-section::before{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(255,255,255,0.1);top:-100px;right:-100px}
        .brand-section::after{content:'';position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,0.08);bottom:-50px;left:-50px}
        .brand-content{text-align:center;z-index:1}
        .brand-logo{width:80px;height:80px;background:#FFFFFF;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 32px;box-shadow:0 8px 32px rgba(0,0,0,0.1)}
        .brand-logo svg{width:48px;height:48px;color:#00BAAD}
        .brand-title{font-size:32px;font-weight:700;color:#FFFFFF;margin-bottom:12px;letter-spacing:-0.5px}
        .brand-subtitle{font-size:16px;color:rgba(255,255,255,0.9)}
        .brand-desc{margin-top:48px;color:rgba(255,255,255,0.8);font-size:14px;line-height:1.8;max-width:360px}
        .login-section{width:520px;display:flex;flex-direction:column;justify-content:center;padding:60px 80px}
        .login-header{margin-bottom:48px}
        .login-title{font-size:28px;font-weight:700;color:#1F2937;margin-bottom:8px}
        .login-desc{font-size:15px;color:#6B7280}
        .form-group{margin-bottom:24px}
        .form-label{display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:8px}
        .form-input{width:100%;height:52px;padding:0 16px;font-size:15px;border:1px solid #E5E7EB;border-radius:12px;background:#FFFFFF;color:#1F2937;transition:all 0.2s;font-family:inherit}
        .form-input:focus{outline:none;border-color:#00BAAD;box-shadow:0 0 0 3px rgba(0,186,173,0.1)}
        .form-input::placeholder{color:#9CA3AF}
        .password-wrapper{position:relative}
        .password-toggle{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9CA3AF}
        .form-options{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px}
        .remember-me{display:flex;align-items:center;gap:8px;cursor:pointer}
        .remember-me input{width:18px;height:18px;accent-color:#00BAAD}
        .remember-me span{font-size:14px;color:#6B7280}
        .forgot-password{font-size:14px;color:#00BAAD;text-decoration:none;font-weight:500}
        .login-btn{width:100%;height:52px;background:linear-gradient(135deg,#00BAAD 0%,#00D4C8 100%);border:none;border-radius:12px;font-size:16px;font-weight:600;color:#FFFFFF;cursor:pointer;transition:all 0.3s;font-family:inherit;box-shadow:0 4px 14px rgba(0,186,173,0.35)}
        .login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,186,173,0.45)}
        .login-footer{margin-top:48px;text-align:center;font-size:13px;color:#9CA3AF}
        @media(max-width:1024px){.brand-section{display:none}.login-section{width:100%;padding:40px 24px}}
    </style>
</head>
<body>
    <div class="brand-section">
        <div class="brand-content">
            <div class="brand-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h1 class="brand-title">体重管理系统</h1>
            <p class="brand-subtitle">银川市卫生健康委员会</p>
            <p class="brand-desc">科学的健康管理，<br>让每一次改变都看得见。</p>
        </div>
    </div>
    <div class="login-section">
        <div class="login-header">
            <h2 class="login-title">欢迎回来</h2>
            <p class="login-desc">请输入您的账号信息登录系统</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">用户名 / 手机号</label>
                <input type="text" class="form-input" placeholder="请输入用户名或手机号" id="username">
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <div class="password-wrapper">
                    <input type="password" class="form-input" placeholder="请输入密码" id="password">
                    <button type="button" class="password-toggle" onclick="togglePassword()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember">
                    <span>记住登录状态</span>
                </label>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>
            <button type="submit" class="login-btn">登 录</button>
        </form>
        <div class="login-footer">
            <p>银川市卫健委体重管理系统 v1.0</p>
        </div>
    </div>
    <script>
        function togglePassword(){
            const pwd=document.getElementById('password');
            pwd.type=pwd.type==='password'?'text':'password';
        }
        document.getElementById('loginForm').addEventListener('submit',function(e){
            e.preventDefault();
            alert('登录功能演示');
        });
    </script>
</body>
</html>
